name: runx evidence

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install runx CLI
        run: npm install -g @runxhq/cli@0.6.13

      - name: Run harness and dogfood
        shell: bash
        env:
          RUNX_RECEIPT_SIGN_KID: runx-demo-key
          RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
          RUNX_RECEIPT_SIGN_ISSUER_TYPE: hosted
        run: |
          set -euo pipefail
          mkdir -p evidence/gha-receipts
          export RUNX_RECEIPT_DIR="$PWD/evidence/gha-receipts"
          runx --version | tee evidence/gha-runx-version.txt
          runx doctor skills/spam-risk-reviewer --json | tee evidence/gha-doctor.json
          runx harness skills/spam-risk-reviewer --receipt-dir "$RUNX_RECEIPT_DIR" --json | tee evidence/gha-harness-output.json
          campaign="$(jq -c '.campaign_draft' skills/spam-risk-reviewer/fixtures/high-risk-incomplete-auth-poor-list.json)"
          list="$(jq -c '.list_metadata' skills/spam-risk-reviewer/fixtures/high-risk-incomplete-auth-poor-list.json)"
          auth="$(jq -c '.sender_auth_posture' skills/spam-risk-reviewer/fixtures/high-risk-incomplete-auth-poor-list.json)"
          runx skill skills/spam-risk-reviewer \
            --input-json campaign_draft "$campaign" \
            --input-json list_metadata "$list" \
            --input-json sender_auth_posture "$auth" \
            --receipt-dir "$RUNX_RECEIPT_DIR" \
            --json | tee evidence/gha-dogfood-output.json
          runx verify --receipt-dir "$RUNX_RECEIPT_DIR" --allow-local-development-signatures --json | tee evidence/gha-verify-output.json || true
          node <<'NODE'
          const fs = require("fs");
          const read = (p) => JSON.parse(fs.readFileSync(p, "utf8"));
          const dogfood = read("evidence/gha-dogfood-output.json");
          const harness = read("evidence/gha-harness-output.json");
          const verify = read("evidence/gha-verify-output.json");
          const receiptRef = dogfood.receipt_id
            ? `runx:receipt:${dogfood.receipt_id}`
            : Array.isArray(harness.receipt_ids) && harness.receipt_ids.length
              ? `runx:receipt:${harness.receipt_ids[harness.receipt_ids.length - 1]}`
              : null;
          const evidence = read("evidence/evidence.json");
          evidence.observations.push(`github actions runx harness status: ${harness.status}`);
          evidence.observations.push(`github actions dogfood receipt_ref: ${receiptRef}`);
          evidence.dogfood.receipt_ref = receiptRef;
          evidence.dogfood.verify_verdict = verify.valid === true ? "valid" : (verify.status ?? "unknown");
          evidence.github_actions = { harness, dogfood, verify };
          fs.writeFileSync("evidence/evidence.json", `${JSON.stringify(evidence, null, 2)}\n`);
          const verification = read("evidence/verification.json");
          verification.runx_harness = { status: harness.status, receipt_ids: harness.receipt_ids ?? [] };
          verification.dogfood = { receipt_ref: receiptRef };
          verification.verify = verify;
          verification.receipt_ref = receiptRef;
          fs.writeFileSync("evidence/verification.json", `${JSON.stringify(verification, null, 2)}\n`);
          fs.appendFileSync("evidence/report.md", `\n- GitHub Actions harness status: ${harness.status}\n- GitHub Actions dogfood receipt_ref: ${receiptRef}\n- GitHub Actions verify status: ${verify.valid === true ? "valid" : (verify.status ?? "unknown")}\n`);
          NODE

      - name: Commit generated evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evidence
          if git diff --cached --quiet; then
            echo "No evidence changes."
          else
            git commit -m "Add GitHub Actions runx evidence"
            git push
          fi
